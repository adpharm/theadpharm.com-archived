version: "3"

# https://taskfile.dev/usage/#output-syntax
output: prefixed

vars:
  AWS_PROFILE: "pharmer"

dotenv:
  - .env
  - .env.vercel

tasks:
  default:
    cmds:
      - task --list-all
  ########################################################################################################################
  #
  #                                        AWS commands (archived)
  #
  ########################################################################################################################
  login:
    requires:
      vars:
        - AWS_PROFILE
    vars:
      AWS_PROFILE: "{{.AWS_PROFILE}}"
    cmds:
      - aws sso login --profile {{.AWS_PROFILE}}

  check-aws-identity:
    requires:
      vars:
        - AWS_PROFILE
    vars:
      AWS_PROFILE: "{{.AWS_PROFILE}}"
    cmds:
      - |
        if ! aws sts get-caller-identity --profile {{.AWS_PROFILE}}; then
          echo ""
          echo "Your '{{.AWS_PROFILE}}' AWS profile is not logged in. Run 'task login' to log in."
          exit 1
        fi
    silent: true

  ########################################################################################################################
  #
  #                                        Development commands
  #
  ########################################################################################################################

  start:
    desc: Start the development server
    cmds:
      - bunx --bun astro dev

  # --------------------------------------------------------------------------------------------------------------------
  # Build — all or individual
  # --------------------------------------------------------------------------------------------------------------------
  build:
    desc: Build the project
    cmds:
      - bunx --bun astro build
  # --------------------------------------------------------------------------------------------------------------------
  # Typecheck — all or individual
  # --------------------------------------------------------------------------------------------------------------------
  typecheck:
    desc: Run TypeScript checks
    cmds:
      - bun run typecheck

  # --------------------------------------------------------------------------------------------------------------------
  # Other commands
  # --------------------------------------------------------------------------------------------------------------------

  # pull dev env from vercel
  env:
    aliases:
      - pull-env
      - pull
    interactive: true
    cmds:
      - bunx vercel env pull .env.vercel

  link:
    desc: Link to Vercel project
    interactive: true
    cmds:
      - bunx vercel link

  ########################################################################################################################
  #
  #                                        Terraform commands
  #
  ########################################################################################################################

  _validate-env:
    internal: true
    requires:
      vars:
        - ENV
    cmds:
      - |
        case "{{.ENV}}" in
          production|staging) ;;
          *) echo "Error: ENV must be 'production' or 'staging', got: '{{.ENV}}'"; exit 1 ;;
        esac

  # `terraform init`
  tfinit:
    desc: Initialize Terraform (ENV=production|staging required)
    requires:
      vars:
        - ENV
    deps:
      - check-aws-identity
    dir: infra/live/{{.ENV}}
    cmds:
      - task: _validate-env
      - terragrunt init {{.CLI_ARGS}}

  # `terragrunt plan`
  tfplan:
    desc: Run Terragrunt plan (ENV=production|staging required)
    requires:
      vars:
        - ENV
    deps:
      - check-aws-identity
    dir: infra/live/{{.ENV}}
    cmds:
      - task: _validate-env
      - task: tfplan:shared
      - terragrunt plan {{.CLI_ARGS}}

  tfplan:shared:
    desc: Run Terragrunt plan for shared infrastructure
    deps:
      - check-aws-identity
    dir: infra/live/shared
    cmds:
      - terragrunt plan {{.CLI_ARGS}}

  # `terragrunt apply` — always applies shared first, then env
  tfapply:
    desc: Apply shared then specified ENV (required)
    interactive: true
    requires:
      vars:
        - ENV
    deps:
      - check-aws-identity
    dir: infra/live/{{.ENV}}
    cmds:
      - task: _validate-env
      - |
        printf "Rebuild lambdas before applying? (y/N): "
        read rebuild
        if [[ "$rebuild" =~ ^[Yy]$ ]]; then
          task build
        fi
      - task: tfapply:shared
      - terragrunt apply {{.CLI_ARGS}}

  tfapply:shared:
    desc: Apply shared infrastructure only
    internal: true
    interactive: true
    dir: infra/live/shared
    cmds:
      - terragrunt apply {{.CLI_ARGS}}

  # `terragrunt destroy`
  tfdestroy:
    desc: Run Terragrunt destroy (ENV=production|staging required)
    interactive: true
    requires:
      vars:
        - ENV
    deps:
      - check-aws-identity
    dir: infra/live/{{.ENV}}
    cmds:
      - task: _validate-env
      - terragrunt destroy {{.CLI_ARGS}}

  # `terragrunt import`
  tfimport:
    desc: Run Terragrunt import (ENV=production|staging required)
    requires:
      vars:
        - ENV
    deps:
      - check-aws-identity
    dir: infra/live/{{.ENV}}
    cmds:
      - task: _validate-env
      - terragrunt import {{.CLI_ARGS}}

  # `terraform state list`
  tflist:
    desc: List Terraform state (ENV=production|staging required)
    requires:
      vars:
        - ENV
    deps:
      - check-aws-identity
    dir: infra/live/{{.ENV}}
    cmds:
      - task: _validate-env
      - terraform state list

  # `terragrunt refresh`
  tfrefresh:
    desc: Run Terragrunt refresh (ENV=production|staging required)
    requires:
      vars:
        - ENV
    deps:
      - check-aws-identity
    dir: infra/live/{{.ENV}}
    cmds:
      - task: _validate-env
      - terragrunt refresh

  # Show outputs for a specific environment
  tfoutput:
    desc: Show Terraform outputs (ENV=production|staging required)
    requires:
      vars:
        - ENV
    deps:
      - check-aws-identity
    dir: infra/live/{{.ENV}}
    cmds:
      - task: _validate-env
      - terragrunt output {{.CLI_ARGS}}

  # Save terraform outputs to JSON file
  save-outputs:
    desc: Save Terraform outputs to JSON file (ENV=production|staging required)
    requires:
      vars:
        - ENV
    deps:
      - check-aws-identity
    dir: infra/live/{{.ENV}}
    cmds:
      - task: _validate-env
      - terragrunt output -json > ../../../terraform-outputs-{{.ENV}}.json
      - echo "Saved {{.ENV}} terraform outputs to terraform-outputs-{{.ENV}}.json"

  # Validate Terraform configuration
  tfvalidate:
    desc: Validate Terraform configuration (ENV=production|staging required)
    requires:
      vars:
        - ENV
    deps:
      - check-aws-identity
    dir: infra/live/{{.ENV}}
    cmds:
      - task: _validate-env
      - terragrunt validate {{.CLI_ARGS}}

  # Format Terraform files
  tffmt:
    desc: Format Terraform files
    cmds:
      - terraform fmt -recursive infra/
